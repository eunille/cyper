services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cybertutor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:z
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:z

  ollama:
    image: ollama/ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
